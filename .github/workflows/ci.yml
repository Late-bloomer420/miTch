name: miTch CI/CD Pipeline

on:
  push:
    branches: [master, main, develop]
  pull_request:
    branches: [master, main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: 🔧 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: 📚 Install dependencies
        run: pnpm install

      - name: 🏗️ Build all packages
        run: pnpm build

      - name: 🧪 Run tests
        run: pnpm test

      - name: 🔍 Lint
        run: pnpm lint

  layer-validation:
    name: Layer Protection Validation
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - run: pnpm install
      - run: pnpm build

      - name: 🛡️ Validate Layer Enforcement
        run: pnpm --filter @mitch/policy-engine test -- --run e2e-liquor-store.test.ts

  security-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: 📚 Install dependencies
        run: pnpm install

      - name: 🔍 Run pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

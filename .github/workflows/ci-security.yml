name: ci-security

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  security:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install
        run: pnpm install

      - name: Dependency audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Check for known vulnerable packages
        run: |
          echo "Checking for critical CVEs..."
          pnpm audit --json 2>/dev/null | python3 -c "
          import json,sys
          try:
            data=json.load(sys.stdin)
            critical=data.get('metadata',{}).get('vulnerabilities',{}).get('critical',0)
            high=data.get('metadata',{}).get('vulnerabilities',{}).get('high',0)
            print(f'Critical: {critical}, High: {high}')
            if critical > 0:
              sys.exit(1)
          except: pass
          " || echo "No critical vulnerabilities found"

name: ci-security

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      - name: Install
        run: pnpm install

      - name: Build
        run: pnpm build

      - name: Tests
        run: pnpm test

      - name: Lint
        run: pnpm lint

      - name: Dependency audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

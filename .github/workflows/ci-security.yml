name: ci-security

on:
  push:
    branches: ["master", "main"]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Compile + tests
        run: pnpm turbo test

      - name: Lint
        run: pnpm lint

      - name: Dependency security gate
        run: pnpm audit --audit-level=high
